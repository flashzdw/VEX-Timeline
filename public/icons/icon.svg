<svg width="1024" height="1024" viewBox="0 0 1024 1024"
xmlns="http://www.w3.org/2000/svg">

<defs>
<linearGradient id="inner" x1="0" y1="0" x2="1" y2="1">
<stop offset="0%" stop-color="#1B2433"/>
<stop offset="100%" stop-color="#0B1220"/>
</linearGradient>
</defs>

<!-- 外层黑色厚边框 -->
<rect x="0" y="0" width="1024" height="1024" rx="200" ry="200" fill="#000000"/>

<!-- 白色中间层 -->
<rect x="100" y="100" width="824" height="824" rx="160" ry="160" fill="#FFFFFF"/>

<!-- 内部深色卡片 -->
<rect x="180" y="180" width="664" height="664" rx="130" ry="130" fill="url(#inner)"/>


<!-- 水平内容条：宽度 = 圆圈直径 (100)；左端圆头，右端稍微短一截（path 而非 rect） -->
<path d="M486 333 H566 A19 19 0 0 1 566 371 H486 A19 19 0 0 1 486 333 Z"
      fill="#9AA4B5"/>
<path d="M486 537 H566 A19 19 0 0 1 566 575 H486 A19 19 0 0 1 486 537 Z"
      fill="#2F76FF"/>
<path d="M486 707 H566 A19 19 0 0 1 566 745 H486 A19 19 0 0 1 486 707 Z"
      fill="#9AA4B5"/>


<!-- 时间轴竖线 -->
<rect x="343" y="370" width="6" height="380" rx="3" ry="3" fill="#C9D2E0"/>


<!-- 顶部节点：已完成（蓝实心圆 + 白勾；尺寸 = 白色节点大小 r=50） -->
<circle cx="346" cy="346" r="62" fill="#9CC2FF"/>
<circle cx="346" cy="346" r="50" fill="#2F76FF"/>
<path d="M318 348 L339 370 L376 326"
fill="none" stroke="#FFFFFF" stroke-width="14"
stroke-linecap="round" stroke-linejoin="round"/>


<!-- 中间节点：未完成（白实心圆，r=50） -->
<circle cx="346" cy="550" r="50" fill="#FFFFFF"/>


<!-- 底部节点：未完成（白实心圆，r=50） -->
<circle cx="346" cy="720" r="50" fill="#FFFFFF"/>

</svg>
