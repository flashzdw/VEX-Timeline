<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- 主渐变：顶蓝 → 中过渡 → 底紫 -->
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0"   stop-color="#5B9BF6"/>
      <stop offset="0.5" stop-color="#6382F0"/>
      <stop offset="1"   stop-color="#8B5CF6"/>
    </linearGradient>

    <!-- 左上柔光带（液态玻璃高光） -->
    <radialGradient id="lightBand" cx="0.3" cy="0.25" r="0.7">
      <stop offset="0"   stop-color="#ffffff" stop-opacity="0.30"/>
      <stop offset="0.7" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>

    <!-- 顶部反光高光 -->
    <linearGradient id="topHighlight" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0"   stop-color="#ffffff" stop-opacity="0.55"/>
      <stop offset="1"   stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>

    <!-- 圆角矩形剪切 -->
    <clipPath id="iconClip">
      <rect x="0" y="0" width="512" height="512" rx="112" ry="112"/>
    </clipPath>

    <!-- 中心主点外光晕 -->
    <radialGradient id="dotGlow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0"    stop-color="#ffffff" stop-opacity="0.85"/>
      <stop offset="0.35" stop-color="#dcebff" stop-opacity="0.55"/>
      <stop offset="1"    stop-color="#dcebff" stop-opacity="0"/>
    </radialGradient>

    <!-- 中心主点内高光 -->
    <radialGradient id="dotInner" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0"   stop-color="#ffffff"/>
      <stop offset="0.7" stop-color="#f3f8ff"/>
      <stop offset="1"   stop-color="#dcebff"/>
    </radialGradient>
  </defs>

  <!-- 1. 玻璃渐变底（被圆角剪切） -->
  <g clip-path="url(#iconClip)">
    <rect x="0" y="0" width="512" height="512" fill="url(#bgGrad)"/>
    <!-- 左上柔光 -->
    <rect x="0" y="0" width="512" height="512" fill="url(#lightBand)"/>
    <!-- 顶部反光条 -->
    <rect x="80" y="20" width="352" height="80" rx="40" ry="40" fill="url(#topHighlight)"/>
  </g>

  <!-- 2. 边缘折射光（内描边） -->
  <rect x="2" y="2" width="508" height="508" rx="111" ry="111"
        fill="none" stroke="#ffffff" stroke-opacity="0.35" stroke-width="3"/>

  <!-- 3. 主体：竖直时间轴 + 4 个小事件点 + 1 个高亮中心点（带光晕） -->
  <g clip-path="url(#iconClip)">
    <!-- 时间轴主线（圆角矩形） -->
    <rect x="249.6" y="102" width="12.8" height="308" rx="6.4" ry="6.4"
          fill="#ffffff" fill-opacity="0.96"/>

    <!-- 上方 2 个小点 -->
    <circle cx="256" cy="143" r="11" fill="#ffffff" fill-opacity="0.78"/>
    <circle cx="256" cy="200" r="11" fill="#ffffff" fill-opacity="0.78"/>

    <!-- 下方 2 个小点 -->
    <circle cx="256" cy="312" r="11" fill="#ffffff" fill-opacity="0.78"/>
    <circle cx="256" cy="369" r="11" fill="#ffffff" fill-opacity="0.78"/>

    <!-- 中心主点光晕 -->
    <circle cx="256" cy="256" r="60" fill="url(#dotGlow)"/>

    <!-- 中心主点主体 -->
    <circle cx="256" cy="256" r="34" fill="url(#dotInner)"/>

    <!-- 中心主点内高光（左上小光斑，模拟液态玻璃折射） -->
    <ellipse cx="247" cy="245" rx="13" ry="11" fill="#ffffff" fill-opacity="0.75"/>
  </g>
</svg>
