<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512" role="img" aria-label="VEX-Timeline">
  <defs>
    <pattern id="dotGrid" x="0" y="0" width="28" height="28" patternUnits="userSpaceOnUse">
      <circle cx="14" cy="14" r="1.2" fill="#D1D5DB" fill-opacity="0.4"/>
    </pattern>
    <linearGradient id="midCardGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#3B82F6"/>
      <stop offset="1" stop-color="#1D4ED8"/>
    </linearGradient>
  </defs>

  <!-- 深色外框（最深颜色 #0F172A，组成图标外圈"边框"） -->
  <rect x="0" y="0" width="512" height="512" rx="115" fill="#0F172A"/>

  <!-- 白色内框（实际内容区，比外框内缩 20px 形成"边框厚度"） -->
  <rect x="20" y="20" width="472" height="472" rx="95" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="2"/>

  <!-- 点阵背景（微弱） -->
  <rect x="32" y="32" width="448" height="448" rx="80" fill="url(#dotGrid)"/>

  <!-- 时间轴主线（比上一版短：y=128..384，长度 256） -->
  <line x1="80" y1="128" x2="80" y2="384"
        stroke="#0F172A" stroke-width="11" stroke-linecap="round"/>

  <!-- 时间轴上 3 个事件标记点（与 3 张卡片的垂直中心对齐: y=150/256/362） -->
  <circle cx="80" cy="150" r="11" fill="#FFFFFF" stroke="#0F172A" stroke-width="5"/>
  <circle cx="80" cy="256" r="14" fill="#3B82F6" stroke="#FFFFFF" stroke-width="4"/>
  <circle cx="80" cy="362" r="11" fill="#FFFFFF" stroke="#0F172A" stroke-width="5"/>

  <!-- 卡片 1（顶部，普通事件，白底）— 缩小版，横向中心 x=256 -->
  <rect x="106" y="114" width="300" height="72" rx="16" ry="16"
        fill="#FFFFFF" stroke="#E5E7EB" stroke-width="2"/>
  <!-- 标题条居中: 256-50=206 -->
  <rect x="206" y="126" width="100" height="10" rx="5" fill="#0F172A"/>
  <!-- 内容 3 行居中 -->
  <rect x="156" y="146" width="200" height="6" rx="3" fill="#CBD5E1"/>
  <rect x="176" y="158" width="160" height="6" rx="3" fill="#CBD5E1"/>
  <rect x="196" y="170" width="120" height="6" rx="3" fill="#CBD5E1"/>
  <!-- 右上角状态点 -->
  <circle cx="386" cy="132" r="7" fill="#3B82F6"/>

  <!-- 卡片 2（中部，当前/重要事件，蓝底高亮）— 缩小版，横向中心 x=256 -->
  <rect x="102" y="216" width="308" height="80" rx="20" ry="20"
        fill="url(#midCardGrad)"/>
  <!-- 标题条居中: 256-60=196 -->
  <rect x="196" y="232" width="120" height="12" rx="6" fill="#FFFFFF"/>
  <!-- 内容 3 行居中 -->
  <rect x="146" y="256" width="220" height="7" rx="3" fill="#FFFFFF" fill-opacity="0.55"/>
  <rect x="166" y="270" width="180" height="7" rx="3" fill="#FFFFFF" fill-opacity="0.55"/>
  <rect x="186" y="284" width="140" height="7" rx="3" fill="#FFFFFF" fill-opacity="0.55"/>
  <!-- 右上角状态点 -->
  <circle cx="390" cy="240" r="8" fill="#FFFFFF"/>

  <!-- 卡片 3（底部，普通事件，白底）— 缩小版，横向中心 x=256 -->
  <rect x="106" y="326" width="300" height="72" rx="16" ry="16"
        fill="#FFFFFF" stroke="#E5E7EB" stroke-width="2"/>
  <!-- 标题条居中 -->
  <rect x="206" y="338" width="100" height="10" rx="5" fill="#0F172A"/>
  <!-- 内容 3 行居中 -->
  <rect x="156" y="358" width="200" height="6" rx="3" fill="#CBD5E1"/>
  <rect x="176" y="370" width="160" height="6" rx="3" fill="#CBD5E1"/>
  <rect x="196" y="382" width="120" height="6" rx="3" fill="#CBD5E1"/>
  <!-- 右上角状态点 -->
  <circle cx="386" cy="344" r="7" fill="#94A3B8"/>
</svg>
