<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512" role="img" aria-label="VEX-Timeline">
  <defs>
    <pattern id="dotGrid" x="0" y="0" width="28" height="28" patternUnits="userSpaceOnUse">
      <circle cx="14" cy="14" r="1.2" fill="#D1D5DB" fill-opacity="0.4"/>
    </pattern>
    <linearGradient id="midCardGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#3B82F6"/>
      <stop offset="1" stop-color="#1D4ED8"/>
    </linearGradient>
  </defs>

  <!-- 白色 squircle 底 + 浅边框 -->
  <rect x="2" y="2" width="508" height="508" rx="96" ry="96"
        fill="#FFFFFF" stroke="#E5E7EB" stroke-width="2"/>

  <!-- 点阵背景（微弱） -->
  <rect x="18" y="18" width="476" height="476" rx="82" ry="82"
        fill="url(#dotGrid)"/>

  <!-- 顶部"窗口"标题条：3 个圆点（窗口控件）+ 中间标题占位 -->
  <rect x="80" y="48" width="352" height="20" rx="6" fill="#F1F5F9"/>
  <circle cx="100" cy="58" r="4" fill="#94A3B8"/>
  <circle cx="118" cy="58" r="4" fill="#94A3B8"/>
  <circle cx="136" cy="58" r="4" fill="#94A3B8"/>
  <rect x="160" y="52" width="180" height="12" rx="6" fill="#CBD5E1"/>

  <!-- 时间轴主线（粗黑，贯穿 3 张卡片） -->
  <line x1="80" y1="100" x2="80" y2="464"
        stroke="#0F172A" stroke-width="12" stroke-linecap="round"/>

  <!-- 时间轴上 3 个事件标记点（与卡片水平居中） -->
  <circle cx="80" cy="160" r="13" fill="#FFFFFF" stroke="#0F172A" stroke-width="6"/>
  <circle cx="80" cy="280" r="16" fill="#3B82F6" stroke="#FFFFFF" stroke-width="5"/>
  <circle cx="80" cy="400" r="13" fill="#FFFFFF" stroke="#0F172A" stroke-width="6"/>

  <!-- 卡片 1（顶部，普通事件，白底） -->
  <rect x="116" y="116" width="340" height="88" rx="18" ry="18"
        fill="#FFFFFF" stroke="#E5E7EB" stroke-width="2"/>
  <!-- 标题条 -->
  <rect x="138" y="132" width="100" height="11" rx="5" fill="#0F172A"/>
  <!-- 内容 3 行 -->
  <rect x="138" y="154" width="200" height="7" rx="3" fill="#CBD5E1"/>
  <rect x="138" y="170" width="160" height="7" rx="3" fill="#CBD5E1"/>
  <rect x="138" y="186" width="120" height="7" rx="3" fill="#CBD5E1"/>
  <!-- 右上角状态点 -->
  <circle cx="436" cy="138" r="8" fill="#3B82F6"/>

  <!-- 卡片 2（中部，当前/重要事件，蓝底高亮） -->
  <rect x="112" y="232" width="348" height="96" rx="22" ry="22"
        fill="url(#midCardGrad)"/>
  <!-- 标题条（白） -->
  <rect x="134" y="252" width="120" height="13" rx="6" fill="#FFFFFF"/>
  <!-- 内容 3 行（半透明白） -->
  <rect x="134" y="278" width="220" height="8" rx="4" fill="#FFFFFF" fill-opacity="0.55"/>
  <rect x="134" y="294" width="180" height="8" rx="4" fill="#FFFFFF" fill-opacity="0.55"/>
  <rect x="134" y="310" width="140" height="8" rx="4" fill="#FFFFFF" fill-opacity="0.55"/>
  <!-- 右上角状态点 -->
  <circle cx="438" cy="258" r="9" fill="#FFFFFF"/>

  <!-- 卡片 3（底部，普通事件，白底） -->
  <rect x="116" y="356" width="340" height="88" rx="18" ry="18"
        fill="#FFFFFF" stroke="#E5E7EB" stroke-width="2"/>
  <!-- 标题条 -->
  <rect x="138" y="372" width="100" height="11" rx="5" fill="#0F172A"/>
  <!-- 内容 3 行 -->
  <rect x="138" y="394" width="200" height="7" rx="3" fill="#CBD5E1"/>
  <rect x="138" y="410" width="160" height="7" rx="3" fill="#CBD5E1"/>
  <rect x="138" y="426" width="120" height="7" rx="3" fill="#CBD5E1"/>
  <!-- 右上角状态点 -->
  <circle cx="436" cy="378" r="8" fill="#94A3B8"/>
</svg>
