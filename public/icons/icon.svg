<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512" role="img" aria-label="VEX-Timeline">
  <defs>
    <pattern id="dotGrid" x="0" y="0" width="28" height="28" patternUnits="userSpaceOnUse">
      <circle cx="14" cy="14" r="1.2" fill="#D1D5DB" fill-opacity="0.4"/>
    </pattern>
    <linearGradient id="midCardGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#3B82F6"/>
      <stop offset="1" stop-color="#1D4ED8"/>
    </linearGradient>
  </defs>

  <!-- 白色 squircle 底 + 浅边框 -->
  <rect x="2" y="2" width="508" height="508" rx="96" ry="96"
        fill="#FFFFFF" stroke="#E5E7EB" stroke-width="2"/>

  <!-- 点阵背景（微弱） -->
  <rect x="18" y="18" width="476" height="476" rx="82" ry="82"
        fill="url(#dotGrid)"/>

  <!-- 时间轴主线（粗黑，垂直居中于 viewBox: y=74..438, center 256） -->
  <line x1="66" y1="74" x2="66" y2="438"
        stroke="#0F172A" stroke-width="12" stroke-linecap="round"/>

  <!-- 时间轴上 3 个事件标记点（与 3 张卡片的垂直中心对齐: y=132/256/380） -->
  <circle cx="66" cy="132" r="13" fill="#FFFFFF" stroke="#0F172A" stroke-width="6"/>
  <circle cx="66" cy="256" r="16" fill="#3B82F6" stroke="#FFFFFF" stroke-width="5"/>
  <circle cx="66" cy="380" r="13" fill="#FFFFFF" stroke="#0F172A" stroke-width="6"/>

  <!-- 卡片 1（顶部，普通事件，白底）— 横向中心 x=272 -->
  <rect x="98" y="88" width="348" height="88" rx="18" ry="18"
        fill="#FFFFFF" stroke="#E5E7EB" stroke-width="2"/>
  <!-- 标题条居中: 272-50=222 -->
  <rect x="222" y="104" width="100" height="11" rx="5" fill="#0F172A"/>
  <!-- 内容 3 行居中: 272±w/2 -->
  <rect x="172" y="126" width="200" height="7" rx="3" fill="#CBD5E1"/>
  <rect x="192" y="142" width="160" height="7" rx="3" fill="#CBD5E1"/>
  <rect x="212" y="158" width="120" height="7" rx="3" fill="#CBD5E1"/>
  <!-- 右上角状态点 -->
  <circle cx="426" cy="110" r="8" fill="#3B82F6"/>

  <!-- 卡片 2（中部，当前/重要事件，蓝底高亮）— 横向中心 x=272 -->
  <rect x="94" y="208" width="356" height="96" rx="22" ry="22"
        fill="url(#midCardGrad)"/>
  <!-- 标题条居中: 272-60=212 -->
  <rect x="212" y="228" width="120" height="13" rx="6" fill="#FFFFFF"/>
  <!-- 内容 3 行居中 -->
  <rect x="162" y="254" width="220" height="8" rx="4" fill="#FFFFFF" fill-opacity="0.55"/>
  <rect x="182" y="270" width="180" height="8" rx="4" fill="#FFFFFF" fill-opacity="0.55"/>
  <rect x="202" y="286" width="140" height="8" rx="4" fill="#FFFFFF" fill-opacity="0.55"/>
  <!-- 右上角状态点 -->
  <circle cx="430" cy="234" r="9" fill="#FFFFFF"/>

  <!-- 卡片 3（底部，普通事件，白底）— 横向中心 x=272 -->
  <rect x="98" y="336" width="348" height="88" rx="18" ry="18"
        fill="#FFFFFF" stroke="#E5E7EB" stroke-width="2"/>
  <!-- 标题条居中 -->
  <rect x="222" y="352" width="100" height="11" rx="5" fill="#0F172A"/>
  <!-- 内容 3 行居中 -->
  <rect x="172" y="374" width="200" height="7" rx="3" fill="#CBD5E1"/>
  <rect x="192" y="390" width="160" height="7" rx="3" fill="#CBD5E1"/>
  <rect x="212" y="406" width="120" height="7" rx="3" fill="#CBD5E1"/>
  <!-- 右上角状态点 -->
  <circle cx="426" cy="358" r="8" fill="#94A3B8"/>
</svg>
