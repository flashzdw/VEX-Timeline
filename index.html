<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VEX-Timeline</title>
    <meta name="theme-color" content="#5B9BF6">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Doto:wght@400;700&family=Space+Grotesk:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="./src/css/styles.css">
    <link rel="manifest" href="./manifest.json">
</head>
<body>
    <div id="app-loading" class="app-loading">
        <div class="app-loading-spinner"></div>
        <div class="app-loading-text">正在加载...</div>
    </div>
    <div class="auth-page hidden" id="auth-page">
        <div class="auth-container">
            <h1 class="auth-title">VEX-Timeline</h1>
            <p class="auth-subtitle">记录备赛每一天</p>
            <div class="diag-banner" id="diag-banner" style="display: none;"></div>
            <div class="diagnostic-bar" id="diagnostic-bar">
                <div class="diag-row" id="diag-url">URL: 检测中...</div>
                <div class="diag-row" id="diag-key">Key: 检测中...</div>
                <div class="diag-row" id="diag-session">Session: 检测中...</div>
                <div class="diag-row" id="diag-user">Token: 检测中...</div>
                <div class="diag-row" id="diag-timeline">时间轴: 检测中...</div>
            </div>
            <div class="auth-form">
            <div class="form-group">
                <label class="form-label" for="auth-username">用户名</label>
                <input type="text" class="form-input" id="auth-username" placeholder="输入用户名" maxlength="20" autocomplete="off">
            </div>
            <div class="form-group">
                <label class="form-label" for="auth-password">密码</label>
                <input type="password" class="form-input" id="auth-password" placeholder="输入密码" autocomplete="off">
            </div>
            <div class="auth-error" id="auth-error"></div>
            <div class="auth-buttons">
                <button class="auth-btn login-btn" id="auth-login-btn">登录</button>
                <button class="auth-btn register-btn" id="auth-register-btn">注册</button>
            </div>
        </div>
        </div>
    </div>
    <div class="container">
        <header class="header">
            <h1 class="title">VEX-Timeline</h1>
            
            <div class="view-toggle">
                <button class="view-toggle-btn active" data-view="timeline">时间轴</button>
                <button class="view-toggle-btn" data-view="month">月历</button>
            </div>
            <div class="header-right">
                <div class="timeline-selector" id="timeline-selector">
                    <select class="timeline-select" id="timeline-select">
                    </select>
                </div>
                <div class="user-info" id="user-info" style="display: none;">
                    <span class="cloud-status cloud-status-ok" id="cloud-status" title="云端状态">☁</span>
                    <span class="user-name" id="user-name"></span>
                    <button class="logout-btn" id="logout-btn" title="登出">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
                            <polyline points="16 17 21 12 16 7"></polyline>
                            <line x1="21" y1="12" x2="9" y2="12"></line>
                        </svg>
                    </button>
                </div>
            </div>
        </header>
        
        <main class="main">
        <div class="timeline-container" id="timeline-container">
            <div class="filter-bar" id="filter-bar">
                <div class="filter-group">
                    <label class="filter-label">重要性</label>
                    <div class="filter-options">
                        <button class="filter-btn active" data-filter="all">全部</button>
                        <button class="filter-btn" data-filter="high">高</button>
                        <button class="filter-btn" data-filter="medium">中</button>
                        <button class="filter-btn" data-filter="low">低</button>
                    </div>
                </div>
            </div>
            <div class="timeline" id="timeline"></div>
        </div>
        
        <div class="calendar-container" id="calendar-container" style="display: none;">
            <div class="date-navigation">
                <button class="nav-btn" id="prev-month">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="15 18 9 12 15 6"></polyline>
                    </svg>
                </button>
                
                <div class="date-display">
                    <span class="date-label" id="date-label"></span>
                </div>
                
                <button class="nav-btn" id="next-month">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="9 18 15 12 9 6"></polyline>
                    </svg>
                </button>
            </div>
            <div class="calendar" id="calendar"></div>
            <div class="day-records-overlay" id="day-records-overlay" style="display: none;">
                <div class="day-records-modal">
                    <div class="day-records-header">
                        <h3 class="day-records-title" id="day-records-title"></h3>
                        <button class="close-day-records" id="close-day-records">
                            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <line x1="18" y1="6" x2="6" y2="18"></line>
                                <line x1="6" y1="6" x2="18" y2="18"></line>
                            </svg>
                        </button>
                    </div>
                    <div class="day-records-content" id="day-records-content"></div>
                </div>
            </div>
        </div>
            
            <button class="add-btn" id="add-btn">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="12" y1="5" x2="12" y2="19"></line>
                    <line x1="5" y1="12" x2="19" y2="12"></line>
                </svg>
            </button>
            <div class="timeline-actions" id="timeline-actions" style="display: none;">
                <button class="action-btn-lg" id="create-team-btn" title="创建赛队时间轴">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
                        <circle cx="9" cy="7" r="4"></circle>
                        <path d="M23 21v-2a4 4 0 0 0-3-3.87"></path>
                        <path d="M16 3.13a4 4 0 0 1 0 7.75"></path>
                    </svg>
                    <span>创建赛队</span>
                </button>
                <button class="action-btn-lg" id="join-team-btn" title="加入赛队时间轴">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"></path>
                        <polyline points="10 17 15 12 10 7"></polyline>
                        <line x1="15" y1="12" x2="3" y2="12"></line>
                    </svg>
                    <span>加入赛队</span>
                </button>
                <button class="action-btn-lg" id="manage-team-btn" title="管理赛队" style="display: none;">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="3"></circle>
                        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
                    </svg>
                    <span>管理</span>
                </button>
            </div>
        </main>
    </div>
    
    <div class="modal-overlay" id="record-modal">
        <div class="modal">
            <div class="modal-header">
                <h2 class="modal-title" id="modal-title">添加记录</h2>
            </div>
            <div class="modal-body">
                <form class="record-form" id="record-form">
                    <div class="form-group">
                        <label class="form-label" for="record-date">日期</label>
                        <input type="date" class="form-input" id="record-date">
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="record-time">时间</label>
                        <input type="time" class="form-input" id="record-time">
                    </div>
                    <div class="form-group">
                        <label class="form-label">重要性</label>
                        <div class="importance-selector" id="importance-selector">
                            <button type="button" class="importance-btn" data-importance="high">高</button>
                            <button type="button" class="importance-btn active" data-importance="medium">中</button>
                            <button type="button" class="importance-btn" data-importance="low">低</button>
                        </div>
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="record-title">标题</label>
                        <input type="text" class="form-input" id="record-title" placeholder="请输入标题">
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="record-content">内容</label>
                        <textarea class="form-textarea" id="record-content" placeholder="请输入内容"></textarea>
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="record-image">图片</label>
                        <input type="file" class="form-input" id="record-image" accept="image/*">
                        <div class="image-preview" id="image-preview" style="display: none;">
                            <img id="preview-img" src="" alt="预览">
                            <button type="button" class="remove-image-btn" id="remove-image-btn">移除</button>
                        </div>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button class="modal-btn cancel-btn" id="cancel-btn">取消</button>
                <button class="modal-btn save-btn" id="save-btn">保存</button>
            </div>
        </div>
    </div>
    
    <div class="modal-overlay" id="create-team-modal">
        <div class="modal">
            <div class="modal-header">
                <h2 class="modal-title">创建赛队时间轴</h2>
            </div>
            <div class="modal-body">
                <form class="record-form" id="create-team-form">
                    <div class="form-group">
                        <label class="form-label" for="team-name">时间轴名称</label>
                        <input type="text" class="form-input" id="team-name" placeholder="输入赛队时间轴名称">
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button class="modal-btn cancel-btn" id="cancel-team-btn">取消</button>
                <button class="modal-btn save-btn" id="save-team-btn">创建</button>
            </div>
        </div>
    </div>
    
    <div class="modal-overlay" id="invite-modal">
        <div class="modal">
            <div class="modal-header">
                <h2 class="modal-title">邀请成员</h2>
            </div>
            <div class="modal-body">
                <div class="invite-content">
                    <div class="invite-code-section">
                        <label class="form-label">邀请码</label>
                        <div class="invite-code-display">
                            <span class="invite-code" id="invite-code-display">---</span>
                            <button class="copy-btn" id="copy-invite-btn" title="复制">
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
                                    <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
                                </svg>
                            </button>
                        </div>
                    </div>
                    <div class="members-section">
                        <label class="form-label">成员列表</label>
                        <div class="members-list" id="members-list"></div>
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <button class="modal-btn cancel-btn" id="close-invite-btn">关闭</button>
            </div>
        </div>
    </div>
    
    <div class="modal-overlay" id="join-team-modal">
        <div class="modal">
            <div class="modal-header">
                <h2 class="modal-title">加入赛队时间轴</h2>
            </div>
            <div class="modal-body">
                <form class="record-form" id="join-team-form">
                    <div class="form-group">
                        <label class="form-label" for="invite-code-input">邀请码</label>
                        <input type="text" class="form-input" id="invite-code-input" placeholder="输入6位邀请码" maxlength="6">
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button class="modal-btn cancel-btn" id="cancel-join-btn">取消</button>
                <button class="modal-btn save-btn" id="confirm-join-btn">加入</button>
            </div>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="./src/js/config.js"></script>
    <script src="./src/js/supabase.js"></script>
    <script src="./src/js/auth.js"></script>
    <script src="./src/js/cloud-db.js"></script>
    <script src="./src/js/app.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then(registration => {
                        console.log('ServiceWorker registration successful');
                    })
                    .catch(err => {
                        console.log('ServiceWorker registration failed: ', err);
                    });
            });
        }
    </script>
</body>
</html>
